<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Imagem WhatsApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #e0e0e0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Montserrat', sans-serif;
        }
        .og-container {
            width: 1200px;
            height: 630px;
            background-color: #1a35a0;
            background-image: url('assets/background.png');
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hero-text {
            flex: 1;
            padding-left: 80px;
            z-index: 2;
        }
        .hero-text img {
            width: 480px;
            margin-bottom: 2rem;
        }
        .hero-institution {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 2.5rem;
        }
        .hero-tagline {
            font-family: 'Source Serif 4', serif;
            font-size: 2.5rem;
            color: #fff;
            line-height: 1.2;
            font-weight: 400;
            font-style: italic;
        }
        .hero-photo {
            flex: 0 0 600px;
            height: 100%;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding-right: 40px;
        }
        .hero-photo img {
            max-height: 95%;
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <!-- Capture uma screenshot (Print) APENAS do retângulo azul escuro abaixo. Salve como og-image.jpg na pasta assets -->
    <div class="og-container">
        <div class="hero-text">
            <img src="assets/logo_vertical.svg" alt="Luiz Muniz">
            <p class="hero-institution">Ministério Público do Estado do Maranhão</p>
            <p class="hero-tagline">Fortalecer a atuação do membro<br>é fortalecer o Ministério Público.</p>
        </div>
        <div class="hero-photo">
            <img src="assets/foto_drluiz.png" alt="Dr. Luiz Muniz">
        </div>
    </div>
</body>
</html>
